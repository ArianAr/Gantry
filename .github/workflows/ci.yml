name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  foundation:
    name: Foundation checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Required files present
        run: |
          set -euo pipefail
          for f in LICENSE README.md SECURITY.md CONTRIBUTING.md ROADMAP.md CHANGELOG.md VERSION specs.md .gitignore; do
            test -f "$f" || { echo "missing $f"; exit 1; }
          done
          test -f .github/PULL_REQUEST_TEMPLATE.md
          test -f .github/workflows/ci.yml
          test -s VERSION
          echo "Foundation OK (VERSION=$(cat VERSION))"

  go:
    name: Go
    runs-on: ubuntu-latest
    needs: foundation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend for embed
        working-directory: frontend
        run: |
          npm ci
          npm run build
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Build
        run: |
          VERSION=$(cat VERSION)
          go build -ldflags "-X github.com/ArianAr/Gantry/internal/version.Version=${VERSION}" -o gantry .

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs: foundation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build
        working-directory: frontend
        run: |
          npm ci
          npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [go, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: |
          docker build \
            --build-arg VERSION=$(cat VERSION) \
            --build-arg COMMIT=${{ github.sha }} \
            -t gantry:ci .
