name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches VERSION
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          FILE=$(cat VERSION | tr -d '[:space:]')
          echo "tag=$TAG file=$FILE"
          test "$TAG" = "$FILE"

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Test
        run: go test ./...

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build binaries
        run: |
          VERSION=$(cat VERSION)
          COMMIT=${GITHUB_SHA}
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LDFLAGS="-s -w -X github.com/ArianAr/Gantry/internal/version.Version=${VERSION} -X github.com/ArianAr/Gantry/internal/version.Commit=${COMMIT} -X github.com/ArianAr/Gantry/internal/version.BuildDate=${DATE}"
          mkdir -p dist
          for pair in linux/amd64 linux/arm64; do
            GOOS=${pair%/*} GOARCH=${pair#*/}
            CGO_ENABLED=0 go build -ldflags "$LDFLAGS" -o "dist/gantry-${GOOS}-${GOARCH}" .
            tar -C dist -czf "dist/gantry_${VERSION}_${GOOS}_${GOARCH}.tar.gz" "gantry-${GOOS}-${GOARCH}"
          done

      - name: Extract changelog section
        id: notes
        run: |
          VERSION=$(cat VERSION)
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" {p=1; next}
            p && $0 ~ /^## \\[/ {exit}
            p {print}
          ' CHANGELOG.md > release_notes.md || true
          if [ ! -s release_notes.md ]; then
            echo "Release v${VERSION}" > release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: dist/*.tar.gz
          generate_release_notes: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/arianar/gantry
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${GITHUB_REF_NAME#v}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          provenance: true
